services:

  db:
    image: postgres:16
    container_name: prototype2-db
    environment:
      POSTGRES_DB: prototype2
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: ./PROTOTYPE2
      dockerfile: Dockerfile
    container_name: prototype2-app
    ports:
      - "8080:8080"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: prototype2
      PGUSER: admin
      PGPASSWORD: ${PGPASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - db

  frontend:
    build:
      context: ./Prototype-FrontEnd-main
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: http://localhost:8080
    container_name: prototype2-frontend
    ports:
      - "3000:3000"
    depends_on:
      - app

volumes:
  postgres-data:
